name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20.x is the engines floor, 22.x is what n8n ships.
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # --ignore-scripts skips the native build of isolated-vm, a transitive
      # devDependency of n8n-workflow that requires Node >= 22 and ships no
      # prebuilt binary for Node 20. Nothing here needs it: n8n-workflow is
      # pulled in for its types, and the published package does not depend on
      # it. Not running third-party install scripts in CI is also good hygiene.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check publish contents
        run: npm pack --dry-run
