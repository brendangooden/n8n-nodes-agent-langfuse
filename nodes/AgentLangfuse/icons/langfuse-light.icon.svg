<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Robot (top 60%) - dark for light backgrounds -->
  <!-- Antenna -->
  <line x1="30" y1="2" x2="30" y2="8" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="30" cy="2" r="2.5" fill="#0A60B5"/>
  <!-- Head -->
  <rect x="10" y="8" width="40" height="28" rx="5" ry="5" fill="#1a1a2e"/>
  <!-- Eyes -->
  <rect x="17" y="16" width="8" height="8" rx="1.5" fill="#4fc3f7"/>
  <rect x="35" y="16" width="8" height="8" rx="1.5" fill="#4fc3f7"/>
  <!-- Mouth -->
  <rect x="20" y="28" width="20" height="4" rx="1.5" fill="#4fc3f7"/>
  <!-- Ears -->
  <rect x="5" y="16" width="5" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="50" y="16" width="5" height="10" rx="2" fill="#1a1a2e"/>
  <!-- Langfuse flames (bottom 30%) -->
  <path d="M22 42 C22 42, 18 48, 22 56 C24 52, 26 50, 28 48 C26 46, 24 44, 22 42Z" fill="#0A60B5"/>
  <path d="M38 42 C38 42, 42 48, 38 56 C36 52, 34 50, 32 48 C34 46, 36 44, 38 42Z" fill="#E11312"/>
</svg>
